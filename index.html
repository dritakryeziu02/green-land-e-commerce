<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Green Land E-commerce</title>
    <link rel="stylesheet" href="css/style.css" />

    <!-- Font Awesome -->

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css"
      integrity="sha512-DxV+EoADOkOygM4IR9yXP8Sb2qwgidEmeqAEmDKIOfPRQZOWbXCzLC6vjbZyy0vPisbH2SyW27+ddLVCN+OMzQ=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Google Fonts -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Chelsea+Market&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />

    <script src="js/main.js" defer></script>
  </head>
  <body>
    <!-- Header -->

    <header class="header">
      <div class="container header-content">
        <div class="logo">
          <i class="fa-solid fa-leaf text-primary"></i>
          <span class="logo-text">Green Land</span>
        </div>

        <nav class="nav-icons">
          <i class="fa-solid fa-magnifying-glass"></i>
          <i class="fa-regular fa-user"></i>
          <a href="cart.html" class="cart-link">
            <i class="fa-solid fa-cart-shopping"></i>
            <span id="cartCount" class="cart-count">0</span>
          </a>
        </nav>
      </div>
    </header>

    <!-- Hero -->

    <section class="hero">
      <div class="hero-overlay">
        <h1 class="hero-title">
          <i class="fa-solid fa-leaf text-primary"></i>Green Land
        </h1>
        <p class="hero-subtitle">Planeti i produkteve</p>
        <p class="hero-text">Nga toka jonë në shtëpinë tuaj</p>
      </div>
    </section>

    <!-- Categories -->

    <section class="categories-wrap">
      <div class="container">
        <div id="categoriesBar" class="chips"></div>
      </div>
    </section>

    <!-- Products -->

    <section class="products-wrap">
      <div class="container">
        <h3 class="section-lead">
          Grab the best deal on
          <a href="#" class="link-primary">our products</a>
        </h3>

        <div id="productsGrid" class="products-grid"></div>
      </div>
    </section>

    <!-- Footer -->

    <footer class="footer">
      <div class="footer-container">
        <p class="footer-left">© 2025 GreenLand. All rights reserved.</p>
        <div class="footer-socials">
          <a href="#"><i class="fab fa-facebook-f"></i></a>
          <a href="#"><i class="fab fa-twitter"></i></a>
          <a href="#"><i class="fab fa-pinterest"></i></a>
        </div>

        <div class="footer-links">
          <a href="#">Terms of Service</a>
          <a href="#">Privacy Policy</a>
        </div>
      </div>
    </footer>
  </body>
</html>
